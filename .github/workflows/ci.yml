name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-frontend-

      - name: Show package.json presence
        run: |
          if [ -f package.json ]; then
            echo "package.json found"
            jq -r '.scripts // {}' package.json || true
          else
            echo "NO package.json"
          fi

      - name: Install dependencies if package.json exists
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "Skipping install: frontend/package.json not found"
          fi

      - name: Lint if script exists
        run: |
          if [ -f package.json ] && jq -e '.scripts.lint' package.json >/dev/null 2>&1; then
            npm run lint
          else
            echo "Skipping lint: no lint script"
          fi

      - name: Test if script exists
        run: |
          if [ -f package.json ] && jq -e '.scripts.test' package.json >/dev/null 2>&1; then
            npm test
          else
            echo "Skipping tests: no test script"
          fi

      - name: Build if script exists
        run: |
          if [ -f package.json ] && jq -e '.scripts.build' package.json >/dev/null 2>&1; then
            npm run build
          else
            echo "Skipping build: no build script"
          fi

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-node-backend-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-backend-

      - name: Show package.json presence
        run: |
          if [ -f package.json ]; then
            echo "package.json found"
            jq -r '.scripts // {}' package.json || true
          else
            echo "NO package.json"
          fi

      - name: Install dependencies if package.json exists
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "Skipping install: backend/package.json not found"
          fi

      - name: Lint if script exists
        run: |
          if [ -f package.json ] && jq -e '.scripts.lint' package.json >/dev/null 2>&1; then
            npm run lint
          else
            echo "Skipping lint: no lint script"
          fi

      - name: Test if script exists
        run: |
          if [ -f package.json ] && jq -e '.scripts.test' package.json >/dev/null 2>&1; then
            npm test
          else
            echo "Skipping tests: no test script"
          fi

      - name: Build if script exists
        run: |
          if [ -f package.json ] && jq -e '.scripts.build' package.json >/dev/null 2>&1; then
            npm run build
          else
            echo "Skipping build: no build script"
          fi
